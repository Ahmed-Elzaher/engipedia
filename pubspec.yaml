name: engipedia
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.4
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.2
  freezed_annotation: 2.4.4
  pinput: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

# 💡 التعديل هنا لقراءة ملف الـ PNG الجديد
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png" # المسار الجديد للصورة الـ PNG
  # شيلنا الـ adaptive حالياً لضمان إن الأيقونة تظهر فوراً بدون تعقيدات Decoder

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svgs/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700